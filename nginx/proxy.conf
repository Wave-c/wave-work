server {
    listen 80;
    server_name 192.168.1.10; # Замените на ваш IP или localhost
    return 301 https://$host$request_uri; # Редирект на HTTPS
}

server {
    listen 443 ssl;
    server_name 192.168.1.10; # Замените на ваш IP или localhost

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    location / {
        add_header 'Access-Control-Allow-Origin' 'https://anton-small:9443' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Set-Cookie' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;


        # Обработка предзапроса OPTIONS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://192.168.1.10:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}