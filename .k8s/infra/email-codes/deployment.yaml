apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-codes
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-codes
  template:
    metadata:
      labels:
        app: email-codes
    spec:
      containers:
      - name: email-codes
        image: redis:7-alpine
        args:
          - "--appendonly"
          - "yes"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 6379
