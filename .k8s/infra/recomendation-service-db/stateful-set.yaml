apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recomendation-service-db
  namespace: infra
spec:
  selector:
    matchLabels:
      app: recomendation-service-db
  serviceName: recomendation-service-db
  replicas: 1
  template:
    metadata:
      labels:
        app: recomendation-service-db
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: recomendation-service-db
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
          - name: POSTGRES_DB
            value: recomendation_service_db
          - name: POSTGRES_USER
            value: wave
          - name: POSTGRES_PASSWORD
            value: Den1234567890
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
