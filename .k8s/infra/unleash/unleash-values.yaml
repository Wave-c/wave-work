postgresql:
  enabled: true
  auth:
    database: unleash
    username: unleash
    password: "Den1234567890" # Этот пароль будет установлен в базе при запуске
  primary:
    persistence:
      enabled: true
      size: 8Gi

unleash:
  database:
    host: "my-unleash-postgresql"
    user: "unleash"
    databaseName: "unleash"
  extraEnv:
    - name: DATABASE_USER
      value: "unleash"
    - name: DATABASE_PASS
      value: "Den1234567890" # Должен совпадать с паролем выше
    - name: DATABASE_NAME
      value: "unleash"
    - name: DATABASE_HOST
      value: "my-unleash-postgresql"
    - name: UNLEASH_DEFAULT_ADMIN_USER_PASSWORD
      value: "Den1234567890"
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: unleash.wave-work.site
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: unleash-tls-cert
      hosts:
        - unleash.wave-work.site
