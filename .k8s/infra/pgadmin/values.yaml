ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: pgadmin.wave-work.site
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: my-pgadmin-pgadmin4
              port:
                number: 80
  tls:
    - hosts:
        - pgadmin.wave-work.site
      secretName: pgadmin-tls-secret