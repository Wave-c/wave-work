apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: work-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-service
  template:
    metadata:
      labels:
        app: work-service
    spec:
      containers:
        - name: work-service
          image: wave1/wave-work-work-service
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080