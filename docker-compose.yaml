services:
  refresh-token-storage:
    image: redis
    container_name: refresh-token-storage
    ports:
      - "6379:6379"
    volumes:
      - refresh_token_storage_data:/data
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: refresh-token-storage
      REDIS_HOST: refresh-token-storage
      REDIS_PORT: refresh-token-storage:6379
    ports:
      - 8999:8081

  unleash-db:
    image: postgres:15
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave -d unleash"]
      interval: 2s
      timeout: 5s
      retries: 10

  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://wave:Den1234567890/@db:5432/unleash
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.default-token"
    depends_on:
      unleash-db:
        condition: service_healthy

volumes:
  refresh_token_storage_data: