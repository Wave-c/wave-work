services:
  refresh-token-storage:
    image: redis
    container_name: refresh-token-storage
    ports:
      - "6379:6379"
    volumes:
      - refresh_token_storage_data:/data
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: refresh-token-storage
      REDIS_HOST: refresh-token-storage
      REDIS_PORT: refresh-token-storage:6379
    ports:
      - 8999:8081

  unleash-db:
    image: postgres:15
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave -d unleash"]
      interval: 2s
      timeout: 5s
      retries: 10

  notification-db:
    image: postgres:16
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890/
    ports:
      - "5433:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  auth-db:
    image: postgres:16
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890/
    ports:
      - "5434:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://wave:Den1234567890@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.default-token"
    depends_on:
      unleash-db:
        condition: service_healthy

  ssl-gen:
    image: alpine:latest
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    command: >
      sh -c "apk add --no-cache openssl &&
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
      -keyout /etc/nginx/ssl/server.key
      -out /etc/nginx/ssl/server.crt
      -subj '/CN=192.168.1.10'"

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "30080:80"
      - "30443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - unleash
      - ssl-gen

  single-use-links:
    image: redis:latest
    container_name: single-use-links
    ports:
      - "6376:6379"
    volumes:
      - single_use_links_data:/data

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "192.168.1.10:8080"
    environment:
      NGROK_AUTHTOKEN: 2WXmuqkxIU6DbfUctoWa31SrKQ0_6oTqYhCS5rozNTsoojmHc
    ports:
      - "4040:4040"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: wave@example.com
      PGADMIN_DEFAULT_PASSWORD: Den1234567890/
    ports:
      - "9052:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
volumes:
  refresh_token_storage_data:
  notification_db_data:
  auth_db_data:
  single_use_links_data:
  pgadmin_data: